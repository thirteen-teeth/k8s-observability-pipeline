---
apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: "house"
  namespace: olap
spec:
  configuration:
    users:
      # Password sourced from the SOPS-encrypted Secret olap/clickhouse-credentials.
      test/k8s_secret_password: olap/clickhouse-credentials/password
      test/networks/ip:
        - "0.0.0.0/0"
      test/grants/query:
        - "GRANT SHOW ON *.*"
        - "GRANT CREATE ON *.* WITH GRANT OPTION"
        - "GRANT SELECT ON system.*"
      # Least-privilege writer for the Kafka -> ClickHouse ETL collector
      # (gitops/apps/base/otel/collector-clickhouse.yaml). The clickhouse
      # exporter runs create_schema, so it needs DDL on the otel database plus
      # the ON CLUSTER privileges that replicated DDL requires; everything else
      # is read-only or denied. Password lives in the same SOPS secret.
      otel_writer/k8s_secret_password: olap/clickhouse-credentials/otel_writer_password
      otel_writer/networks/ip:
        - "0.0.0.0/0"
      otel_writer/grants/query:
        - "GRANT SHOW ON *.*"
        - "GRANT SELECT ON system.*"
        - "GRANT CREATE DATABASE ON otel.*"
        - "GRANT CREATE TABLE, CREATE VIEW, ALTER, DROP ON otel.*"
        - "GRANT INSERT, SELECT ON otel.*"
        # Replicated/distributed DDL (ON CLUSTER) and Distributed-table reads
        # need the cluster + remote privileges.
        - "GRANT REMOTE ON *.*"
        - "GRANT CLUSTER ON *.*"
      # Read-only user for the Grafana ClickHouse data source
      # (kube-prometheus-stack). Can only SELECT the otel sink tables and read
      # system metadata — no writes, no DDL. Password lives in the same SOPS
      # secret (key grafana_reader_password) and is mirrored into the
      # monitoring/grafana-credentials Secret.
      grafana_reader/k8s_secret_password: olap/clickhouse-credentials/grafana_reader_password
      grafana_reader/networks/ip:
        - "0.0.0.0/0"
      grafana_reader/grants/query:
        - "GRANT SHOW ON *.*"
        - "GRANT SELECT ON otel.*"
        - "GRANT SELECT ON system.*"
    settings:
      # Expose the native ClickHouse Prometheus endpoint on every server pod
      # (ClickHouseMetrics_*, ClickHouseProfileEvents_*, ClickHouseAsyncMetrics_*).
      # Scraped per-replica by the clickhouse-server ScrapeConfig (rewrites
      # __address__ to pod IP:9363; see scrapeconfigs.yaml).
      # The operator's own metrics-exporter is not used because this repo defines
      # explicit CHI users (no clickhouse_operator user for it to authenticate).
      prometheus/endpoint: "/metrics"
      prometheus/port: "9363"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
      prometheus/status_info: "true"
    zookeeper:
      # The Altinity ClickHouse Keeper operator publishes a headless Service
      # named "keeper-<chk-name>" (here keeper-chk) that fronts all keeper pods;
      # ClickHouse resolves its A records to the full ensemble. The old
      # per-pod chk-N.<svc> names never resolved (the operator governs the
      # keeper StatefulSet under keeper-chk, not a hand-made "zookeeper" svc).
      nodes:
        - host: ${keeper_service:=keeper-chk}.${olap_namespace:=olap}
          port: 2181
    clusters:
      - name: replicated
        templates:
          podTemplate: pod-template-with-volumes
        layout:
          # Topology is set per environment via the cluster-vars ConfigMap
          # (Flux postBuild). Defaults match a small dev-sized cluster.
          shardsCount: ${ch_shards_count:=2}
          replicasCount: ${ch_replicas_count:=2}
  templates:
    podTemplates:
      - name: pod-template-with-volumes
        spec:
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:26.3
              volumeMounts:
                - name: data-storage-vc-template
                  mountPath: /var/lib/clickhouse
                - name: log-storage-vc-template
                  mountPath: /var/log/clickhouse-server
    volumeClaimTemplates:
      - name: data-storage-vc-template
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "${ch_data_size:=5Gi}"
      - name: log-storage-vc-template
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "${ch_log_size:=2Gi}"
