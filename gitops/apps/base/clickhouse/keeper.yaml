---
apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: chk
  namespace: olap
spec:
  defaults:
    templates:
      # The operator mounts this volumeClaimTemplate at the keeper's fixed
      # storage path (/var/lib/clickhouse-keeper), which holds the Raft logs
      # and snapshots. This is the supported way to give keeper persistent
      # storage; arbitrary named volumeMounts are not materialized for CHK.
      dataVolumeClaimTemplate: default
  configuration:
    clusters:
      - name: "simple-3"
        layout:
          replicasCount: 3
    settings:
      logger/level: "information"
      logger/console: "true"
      listen_host: "0.0.0.0"
      keeper_server/storage_path: /var/lib/clickhouse-keeper
      keeper_server/tcp_port: "2181"
      keeper_server/four_letter_word_white_list: "*"
      keeper_server/coordination_settings/raft_logs_level: "information"
      keeper_server/raft_configuration/server/port: "9444"
      prometheus/endpoint: "/metrics"
      prometheus/port: "7000"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
      prometheus/status_info: "false"
  templates:
    podTemplates:
      - name: default
        spec:
          # Spread keeper replicas across nodes. whenUnsatisfiable is set per
          # environment via the cluster-vars ConfigMap (Flux postBuild):
          # local (single-node) uses ScheduleAnyway so all 3 replicas can
          # co-schedule; dev/prod use DoNotSchedule to force one per node.
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: "kubernetes.io/hostname"
              whenUnsatisfiable: "${keeper_spread_policy:=DoNotSchedule}"
              labelSelector:
                matchLabels:
                  app: clickhouse-keeper
          containers:
            - name: clickhouse-keeper
              imagePullPolicy: IfNotPresent
              image: "clickhouse/clickhouse-keeper:26.3-alpine"
              resources:
                requests:
                  memory: "256M"
                  cpu: "1"
                limits:
                  memory: "4Gi"
                  cpu: "2"
    volumeClaimTemplates:
      - name: default
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "${keeper_data_size:=10Gi}"
