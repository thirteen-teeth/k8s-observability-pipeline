---
# ClickHouse server replicas expose the native Prometheus endpoint on port 9363
# (enabled in cluster.yaml spec.configuration.settings prometheus/*). The
# Altinity operator does not publish 9363 as a named Service/container port, so
# pods are scraped directly by number via targetPort. Prometheus sends a
# User-Agent header (which the ClickHouse HTTP handler requires), so the scrape
# succeeds. Discovered cluster-wide because the kube-prometheus-stack
# HelmRelease sets podMonitorSelectorNilUsesHelmValues: false.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: clickhouse-server-monitor
  namespace: olap
  labels:
    app: clickhouse
spec:
  namespaceSelector:
    matchNames:
      - olap
  selector:
    matchLabels:
      clickhouse.altinity.com/chi: house
  podMetricsEndpoints:
    - targetPort: 9363
      interval: 30s
      path: /metrics
---
# ClickHouse Keeper replicas expose the same native Prometheus endpoint on port
# 7000 (enabled in keeper.yaml settings prometheus/*). Same direct-by-number
# scrape as the servers above.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: clickhouse-keeper-monitor
  namespace: olap
  labels:
    app: clickhouse-keeper
spec:
  namespaceSelector:
    matchNames:
      - olap
  selector:
    matchLabels:
      clickhouse-keeper.altinity.com/chk: chk
  podMetricsEndpoints:
    - targetPort: 7000
      interval: 30s
      path: /metrics
