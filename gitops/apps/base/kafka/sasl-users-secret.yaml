# SCRAM-SHA-512 passwords for the OTLP KafkaUsers (users.yaml references these
# keys via spec.authentication.password.valueFrom). Supplying our own passwords
# — instead of letting Strimzi generate them — lets us mirror the same values
# into the collectors' namespace (otel/otel-etl-credentials) so the SASL client
# config and the broker-side credential stay in sync from one source of truth.
#
# SOPS+age encrypted (see .sops.yaml); Flux decrypts at apply time via sops-age.
# Edit with `sops gitops/apps/base/kafka/sasl-users-secret.yaml` — never commit
# plaintext. If any value changes, update the matching key in
# gitops/apps/base/otel/etl-credentials.yaml so the client passwords match.
apiVersion: v1
kind: Secret
metadata:
    name: kafka-etl-user-passwords
    namespace: kafka
type: Opaque
