# Declaring the OTLP topics explicitly (managed by the Strimzi Topic Operator)
# means the producer needs no cluster-level "create topic" ACL — the topics
# already exist, so its KafkaUser can be scoped to Write on just these names.
# Partition count sets the consumer parallelism ceiling for the ETL collectors;
# replication factor 3 matches the broker replicas / min.insync.replicas = 2.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: otlp_logs
  namespace: kafka
  labels:
    strimzi.io/cluster: teeth-queue
spec:
  partitions: 3
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: otlp_traces
  namespace: kafka
  labels:
    strimzi.io/cluster: teeth-queue
spec:
  partitions: 3
  replicas: 3
