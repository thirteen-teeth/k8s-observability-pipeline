# Initial admin credentials for the OpenSearch security plugin.
#
# OpenSearch 2.12+ (this cluster runs 3.7.0) requires the security demo
# installer to receive an OPENSEARCH_INITIAL_ADMIN_PASSWORD that satisfies a
# strength regex (>= 8 chars with upper, lower, digit, and special character).
# The operator auto-generates this secret (named "<cluster>-admin-password")
# only when it is absent, and its generated value omits a special character, so
# every node crash-loops at the demo-installer step. Providing the secret here
# gives the operator a compliant password. The data/stringData values are
# SOPS+age encrypted (see .sops.yaml), exactly like the ClickHouse credentials;
# Flux decrypts them at apply time via the sops-age key. Edit with
# `sops gitops/apps/base/opensearch/admin-secret.yaml` — never commit plaintext.
apiVersion: v1
kind: Secret
metadata:
    name: teeth-search-admin-password
    namespace: search
type: Opaque
stringData:
    username: ENC[AES256_GCM,data:aHs3kz0=,iv:drClxJxRZInSL8WzaIe8cdRjPt23bXI/kvKpIhst5mw=,tag:LfuaOp7KpaiEgdAwZUOJug==,type:str]
