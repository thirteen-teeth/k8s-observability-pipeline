---
# OpenSearch cluster for the ClickHouse-vs-OpenSearch disk-usage benchmark.
# Reconciled by the OpenSearch operator installed under
# gitops/infrastructure/operators/opensearch-operator.yaml. Uses the current
# opensearch.org API group (opensearch.opster.io is deprecated in the 3.x operator).
apiVersion: opensearch.org/v1
kind: OpenSearchCluster
metadata:
  name: teeth-search
  namespace: search
spec:
  general:
    serviceName: teeth-search
    version: "3.7.0"
    # The operator runs an init container per pod that sets
    # vm.max_map_count=262144 (setVMMaxMapCount defaults to true), so no
    # host-level sysctl tuning is required for OpenSearch to start.
  security:
    # Let the operator own the security plugin: it generates a self-signed CA
    # plus transport/HTTP certs, wires them into opensearch.yml, disables the
    # image's demo-config installer, and switches the readiness/startup probes
    # to HTTPS. Without this the operator leaves security "disabled" and probes
    # over plain HTTP, but the stock image still enables TLS on 9200 — so the
    # probe hits "not an SSL/TLS record" and nodes never become Ready.
    tls:
      transport:
        generate: true
      http:
        generate: true
  nodePools:
    # Dedicated cluster-manager (master) nodes. OpenSearch requires at least
    # three master-eligible nodes — single-node clusters are not supported.
    - component: masters
      replicas: 3
      diskSize: "2Gi"
      roles:
        - "cluster_manager"
      resources:
        requests:
          memory: "${opensearch_master_mem:=1Gi}"
          cpu: "250m"
        limits:
          memory: "${opensearch_master_mem:=1Gi}"
          cpu: "500m"
    # Three dedicated data nodes — where indexed OTLP data (and therefore the
    # on-disk footprint being benchmarked) lives. Data-node disk size is set
    # per environment via the cluster-vars ConfigMap (Flux postBuild); the
    # default matches a small dev-sized node.
    - component: data
      replicas: 3
      diskSize: "${opensearch_disk_size:=5Gi}"
      roles:
        - "data"
        - "ingest"
      resources:
        requests:
          memory: "${opensearch_data_mem:=2Gi}"
          cpu: "500m"
        limits:
          memory: "${opensearch_data_mem:=2Gi}"
          cpu: "1000m"
