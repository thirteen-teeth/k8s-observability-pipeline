# Plaintext password for the OpenSearch otel_writer user. The OpensearchUser
# CR (users.yaml) references this key via spec.passwordFrom; the OpenSearch
# operator reads the plaintext and writes the *hashed* credential into the
# security plugin itself — so no bcrypt hash is ever committed to Git, only this
# SOPS+age-encrypted plaintext (see .sops.yaml). Flux decrypts at apply time via
# the sops-age key. The same plaintext is mirrored into the collector's env via
# gitops/apps/base/otel/etl-credentials.yaml (key opensearch_password) so the
# exporter authenticates with the value the operator provisioned.
# Edit with `sops gitops/apps/base/opensearch/etl-user-secret.yaml` — never
# commit plaintext.
apiVersion: v1
kind: Secret
metadata:
    name: opensearch-etl-credentials
    namespace: search
type: Opaque
stringData:
    otel_writer_password: ENC[AES256_GCM,data:z0d8JuBwV62B1W/Flj2qK4MNsnY1g/ArUt8MdTx4I+M=,iv:TidyKS5g01036zEGaxNVOLBUggG8RsgeNeLYl+83qto=,tag:k58YbKw4zSHAEZgHQ7Dq/Q==,type:str]
