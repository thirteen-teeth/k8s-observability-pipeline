---
apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: my-collector-kafka
  namespace: otel
spec:
  mode: deployment
  image: otel/opentelemetry-collector-contrib:0.154.0
  env:
  - name: OTEL_LOG_LEVEL
    value: "info"
  # SCRAM password for the otel-producer KafkaUser, injected from the
  # SOPS-encrypted otel-etl-credentials Secret and read below as ${env:...}.
  - name: KAFKA_PASSWORD
    valueFrom:
      secretKeyRef:
        name: otel-etl-credentials
        key: kafka_producer_password
  config: |
    receivers:
      fluentforward:
        endpoint: 0.0.0.0:24224
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        # send_batch_max_size hard-caps each emitted batch. The kafka exporter
        # marshals one batch into a single Kafka record, and the producer
        # rejects records over ~1,000,000 bytes (MESSAGE_TOO_LARGE) — without an
        # upper bound a large batch is permanently dropped. At ~700-850 B per
        # otlp_json log record, 800 records stays well under the limit (~0.6 MB).
        send_batch_size: 800
        send_batch_max_size: 800
        timeout: 5s
      memory_limiter:
        check_interval: 2s
        limit_mib: 1800
        spike_limit_mib: 500
      resourcedetection/system:
        detectors: [ "system" ]
        system:
          hostname_sources: [ "os" ]
      resource:
        attributes:
          - key: service.name
            value: "upsertedServiceName"
            action: upsert
    exporters:
      kafka/logs:
        brokers:
          - ${kafka_cluster_name:=teeth-queue}-kafka-brokers.${kafka_namespace:=kafka}.svc.cluster.local:9092
        auth:
          sasl:
            username: otel-producer
            password: $${env:KAFKA_PASSWORD}
            mechanism: SCRAM-SHA-512
        logs:
          encoding: otlp_json
          topic: otlp_logs
      kafka/traces:
        brokers:
          - ${kafka_cluster_name:=teeth-queue}-kafka-brokers.${kafka_namespace:=kafka}.svc.cluster.local:9092
        auth:
          sasl:
            username: otel-producer
            password: $${env:KAFKA_PASSWORD}
            mechanism: SCRAM-SHA-512
        traces:
          encoding: otlp_json
          topic: otlp_traces
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777
      zpages:
        endpoint: 0.0.0.0:55679
    service:
      extensions: [ pprof, zpages, health_check ]
      pipelines:
        logs:
          receivers: [ fluentforward, otlp ]
          processors: [ memory_limiter, batch, resourcedetection/system, resource ]
          exporters: [ kafka/logs ]
        traces:
          receivers: [ otlp ]
          processors: [ memory_limiter, batch, resourcedetection/system, resource ]
          exporters: [ kafka/traces ]
