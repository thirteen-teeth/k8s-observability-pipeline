# Client credentials consumed by the otel-namespace collectors as environment
# variables (referenced from each OpenTelemetryCollector's spec.env via
# secretKeyRef, then read in the collector config as ${env:VAR}). This is the
# otel-side mirror of the passwords that are authoritative elsewhere:
#   kafka_producer_password   == kafka/kafka-etl-user-passwords  key otel-producer
#   kafka_clickhouse_password == kafka/kafka-etl-user-passwords  key otel-clickhouse
#   kafka_opensearch_password == kafka/kafka-etl-user-passwords  key otel-opensearch
#   clickhouse_password       == olap/clickhouse-credentials     key otel_writer_password
#   opensearch_password       == search/opensearch-etl-credentials key otel_writer_password
# Keep the values in sync with those sources when rotating.
#
# SOPS+age encrypted (see .sops.yaml); Flux decrypts at apply time via sops-age.
# Edit with `sops gitops/apps/base/otel/etl-credentials.yaml` — never commit
# plaintext.
