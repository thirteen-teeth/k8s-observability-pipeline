---
# Platform wiring conventions — the single canonical home for the names and
# namespaces that one app uses to reach another in-cluster. Consumers compose
# their connection strings from these facts (Flux postBuild substitution), e.g.
#   ${kafka_cluster_name}-kafka-brokers.${kafka_namespace}.svc.cluster.local:9092
# so adding a new service that talks to Kafka/ClickHouse needs no new hardcoded
# DNS — just reuse these vars. Change a name/namespace here and every consumer
# follows. Per-environment values still live in clusters/<env>/cluster-vars.yaml;
# this file holds platform-wide constants shared by all environments.
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-endpoints
  namespace: flux-system
  labels:
    # Re-run Kustomizations that substituteFrom this ConfigMap when it changes.
    reconcile.fluxcd.io/watch: Enabled
data:
  # Kafka (Strimzi). Service DNS is "<cluster>-kafka-<role>.<namespace>.svc.cluster.local".
  kafka_cluster_name: "teeth-queue"
  kafka_namespace: "kafka"
  # ClickHouse Keeper Service + namespace, consumed by the ClickHouse CR. This
  # is the Altinity keeper operator's own headless Service ("keeper-<chk-name>"),
  # which fronts the keeper ensemble; do not invent a separate alias Service.
  keeper_service: "keeper-chk"
  olap_namespace: "olap"
  # ClickHouse client Service (Altinity operator names it "clickhouse-<chi>"),
  # consumed by the Kafka -> ClickHouse ETL collector's native-protocol endpoint.
  clickhouse_service: "clickhouse-house"
  # OpenSearch client Service + namespace, consumed by the Kafka -> OpenSearch
  # ETL collector's HTTPS exporter endpoint.
  search_service: "teeth-search"
  search_namespace: "search"
