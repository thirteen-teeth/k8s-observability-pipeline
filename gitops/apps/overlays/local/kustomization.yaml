apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # ClickHouse Keeper: single-node friendly (no anti-affinity) + tiny PVCs.
  - target:
      kind: ClickHouseKeeperInstallation
      name: chk
    patch: |-
      - op: remove
        path: /spec/templates/podTemplates/0/spec/affinity
      - op: replace
        path: /spec/templates/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 1Gi
      - op: replace
        path: /spec/templates/volumeClaimTemplates/1/spec/resources/requests/storage
        value: 1Gi
      - op: replace
        path: /spec/templates/volumeClaimTemplates/2/spec/resources/requests/storage
        value: 512Mi
  # ClickHouse cluster: tiny data/log PVCs.
  - target:
      kind: ClickHouseInstallation
      name: house
    patch: |-
      - op: replace
        path: /spec/templates/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 1Gi
      - op: replace
        path: /spec/templates/volumeClaimTemplates/1/spec/resources/requests/storage
        value: 512Mi
  # Kafka (KRaft): tiny broker PVC on the dual-role node pool.
  - target:
      kind: KafkaNodePool
      name: dual-role
    patch: |-
      - op: replace
        path: /spec/storage/volumes/0/size
        value: 2Gi
