---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 10m
  dependsOn:
    - name: infrastructure
  path: ./gitops/apps/base
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/part-of: observability-platform
      app.kubernetes.io/managed-by: flux
      environment: dev
  postBuild:
    substituteFrom:
      # Shared platform wiring conventions (names/namespaces). Optional so the
      # very first reconcile — before this ConfigMap is applied — falls back to
      # the defaults baked into the base manifests instead of failing.
      - kind: ConfigMap
        name: platform-endpoints
        optional: true
      # Per-environment values (override platform defaults where they overlap).
      - kind: ConfigMap
        name: cluster-vars
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
