---
# Per-environment values consumed by the `apps` Kustomization via
# spec.postBuild.substituteFrom. This is the single place to tune environment
# differences (storage sizes, keeper spread policy) — there are no overlays or
# kustomize patches.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
  labels:
    # Re-run the apps Kustomization immediately when these values change.
    reconcile.fluxcd.io/watch: Enabled
data:
  environment: "local"
  # Single-node cluster: let all 3 keeper replicas co-schedule.
  keeper_spread_policy: "ScheduleAnyway"
  keeper_data_size: "1Gi"
  ch_data_size: "1Gi"
  ch_log_size: "512Mi"
  # ClickHouse cluster topology (shards x replicas). Local runs 2 shards to
  # lighten a single-workstation cluster while still exercising sharded fan-out.
  ch_shards_count: "2"
  ch_replicas_count: "1"
  kafka_storage_size: "2Gi"
  # OpenSearch data nodePool size. Local runs 2 data nodes (vs the default 3 in
  # dev/prod) to lighten a single-workstation cluster while still exercising
  # multi-data-node shard allocation.
  opensearch_data_replicas: "2"
  # OpenSearch data-node PVC size (per data node; disk-usage benchmark vs ClickHouse).
  opensearch_disk_size: "5Gi"
  # Shrink OpenSearch memory requests/limits for a single 16GB workstation
  # (defaults are 1Gi master / 2Gi data per node). With 3 master + 2 data nodes
  # these bring the cluster down to 3x1Gi + 2x1Gi = 5Gi total.
  #
  # 1Gi is the floor: the operator auto-sizes the JVM heap to ~50% of the memory
  # limit, so 512Mi -> -Xmx256M, which is too small for an OpenSearch 3.7 node's
  # off-heap footprint (Lucene, threads, metaspace, and the kNN/neural/gRPC
  # plugins that load regardless of node role) and OOMKills the pod on startup.
  opensearch_master_mem: "1Gi"
  opensearch_data_mem: "1Gi"
