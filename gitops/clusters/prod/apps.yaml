---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 10m
  dependsOn:
    - name: infrastructure
  path: ./gitops/apps/base
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/part-of: observability-platform
      app.kubernetes.io/managed-by: flux
      environment: prod
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  sourceRef:
    kind: GitRepository
    name: flux-system
