---
# Per-environment values consumed by the `apps` Kustomization via
# spec.postBuild.substituteFrom. This is the single place to tune environment
# differences (storage sizes, keeper spread policy) — there are no overlays or
# kustomize patches.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
  labels:
    # Re-run the apps Kustomization immediately when these values change.
    reconcile.fluxcd.io/watch: Enabled
data:
  environment: "prod"
  # Multi-node cluster: force one keeper replica per node.
  keeper_spread_policy: "DoNotSchedule"
  keeper_data_size: "50Gi"
  ch_data_size: "100Gi"
  ch_log_size: "10Gi"
  # ClickHouse cluster topology (shards x replicas).
  ch_shards_count: "6"
  ch_replicas_count: "1"
  kafka_storage_size: "50Gi"
  # OpenSearch data-node PVC size (3 data nodes; disk-usage benchmark vs ClickHouse).
  opensearch_disk_size: "100Gi"
