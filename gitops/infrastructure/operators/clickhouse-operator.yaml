---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator
  namespace: olap
spec:
  interval: 30m
  releaseName: clickhouse-operator
  chart:
    spec:
      chart: altinity-clickhouse-operator
      version: "0.27.1"
      sourceRef:
        kind: HelmRepository
        name: altinity-clickhouse-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # The operator pod runs two containers (the operator + the metrics
    # exporter); both ship with no resource requests/limits by default, so set
    # modest ones here. This is a low-traffic control-plane pod.
    operator:
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    metrics:
      resources:
        requests:
          memory: "64Mi"
          cpu: "25m"
        limits:
          memory: "128Mi"
          cpu: "250m"

