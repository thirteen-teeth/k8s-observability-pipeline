---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-operator
  namespace: olap
spec:
  interval: 30m
  releaseName: clickhouse-operator
  chart:
    spec:
      chart: altinity-clickhouse-operator
      version: "0.27.1"
      sourceRef:
        kind: HelmRepository
        name: altinity-clickhouse-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
