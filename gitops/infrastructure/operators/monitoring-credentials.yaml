# Grafana admin credentials + the ClickHouse/OpenSearch data-source credentials
# consumed by the kube-prometheus-stack HelmRelease (Grafana admin.existingSecret
# + envValueFrom). data/stringData are SOPS+age encrypted (see .sops.yaml); Flux
# decrypts at apply time via the sops-age secret. The infrastructure Kustomization
# carries a decryption block so this resolves. Keys:
#   admin-user/admin-password  -> Grafana login
#   clickhouse-password        -> matches olap/clickhouse-credentials grafana_reader_password
#   opensearch-username/-password -> copied from search/teeth-search-admin-password
# Edit with: SOPS_AGE_KEY_FILE=.sops/age.key sops gitops/infrastructure/operators/monitoring-credentials.yaml
