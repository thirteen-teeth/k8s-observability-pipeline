---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-operator
  namespace: search
spec:
  interval: 30m
  releaseName: opensearch-operator
  chart:
    spec:
      chart: opensearch-operator
      # Pinned to 2.7.0 for the OpenSearch 2.x line. The 2.8.x charts pin the
      # same operator image (appVersion 2.8.0) but their deployment template
      # passes a `--enable-webhooks` flag the 2.8.0 binary doesn't define, so
      # the manager crash-loops. 2.7.0 predates the webhook feature and runs
      # cleanly without any cert-manager dependency. (3.0.x targets OpenSearch 3.x.)
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
