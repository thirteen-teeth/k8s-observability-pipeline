---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-operator
  namespace: search
spec:
  interval: 30m
  releaseName: opensearch-operator
  chart:
    spec:
      chart: opensearch-operator
      # Latest operator line (chart 3.0.x; operator image appVersion 3.0.0-alpha),
      # which targets OpenSearch 3.x clusters. Unlike the 2.8.x charts (whose 2.8.0
      # image crash-loops on the chart's `--enable-webhooks` flag), this image
      # accepts the flag, so disabling the webhook below works cleanly.
      version: "3.0.2"
      sourceRef:
        kind: HelmRepository
        name: opensearch-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # The validating webhook's serving cert defaults to cert-manager. This repo
    # has no cert-manager (the OTel operator likewise self-generates its cert),
    # so disable the admission webhook — the operator still reconciles
    # OpenSearchCluster resources without it.
    webhook:
      enabled: false
