---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch-operator
  namespace: search
spec:
  interval: 30m
  releaseName: opensearch-operator
  chart:
    spec:
      chart: opensearch-operator
      # 2.8.x is the latest stable operator line for OpenSearch 2.x clusters
      # (the 3.0.x charts target OpenSearch 3.x / appVersion 3.0.0-alpha).
      version: "2.8.2"
      sourceRef:
        kind: HelmRepository
        name: opensearch-operator
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # The chart's validating webhook defaults to provisioning its TLS cert via
    # cert-manager. This repo does not run cert-manager (see the OTel operator,
    # which self-generates its webhook cert), so disable the admission webhook.
    # The operator still reconciles OpenSearchCluster resources without it.
    webhook:
      enabled: false
