---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-operator
  namespace: otel
spec:
  interval: 30m
  releaseName: opentelemetry-operator
  chart:
    spec:
      chart: opentelemetry-operator
      version: "0.115.0"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    manager:
      collectorImage:
        repository: otel/opentelemetry-collector-contrib
      # The manager container ships with no resource requests/limits by default;
      # set modest control-plane values here.
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    # Use the chart's self-signed webhook certs so cert-manager is not required.
    admissionWebhooks:
      certManager:
        enabled: false
      autoGenerateCert:
        enabled: true
