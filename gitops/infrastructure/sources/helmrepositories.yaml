---
# Altinity ClickHouse operator chart
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: altinity-clickhouse-operator
  namespace: flux-system
spec:
  interval: 1h
  url: https://docs.altinity.com/clickhouse-operator/
---
# Strimzi Kafka operator chart
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: strimzi
  namespace: flux-system
spec:
  interval: 1h
  url: https://strimzi.io/charts/
---
# OpenTelemetry operator chart
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: open-telemetry
  namespace: flux-system
spec:
  interval: 1h
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
---
# OpenSearch (opster) operator chart
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: opensearch-operator
  namespace: flux-system
spec:
  interval: 1h
  url: https://opensearch-project.github.io/opensearch-k8s-operator/
---
# Prometheus community charts (kube-prometheus-stack: Prometheus operator,
# Grafana, node-exporter, kube-state-metrics).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
# prometheus-msteams: bridges Alertmanager webhooks to a Microsoft Teams
# Power Automate ("Workflows") webhook, rendering a custom Adaptive Card.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-msteams
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-msteams.github.io/prometheus-msteams/
